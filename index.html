<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>IPL Cricket 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Nunito:wght@800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;font-family:'Nunito',sans-serif;overflow:hidden;}
.bo{font-family:'Black Ops One',sans-serif;}

/* ═══════════════════════════════════════
   9:16 FRAME — everything lives inside this
   ═══════════════════════════════════════ */
#frame{
  position:fixed;
  /* Center the 9:16 box on any screen */
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  /* 9:16 = width * 16/9 = height, so height = width*16/9 */
  width:min(100vw, calc(100vh * 9/16));
  height:min(100vh, calc(100vw * 16/9));
  background:#07020f;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ── SCREENS — all live inside #frame ── */
.screen{display:none;width:100%;height:100%;flex-direction:column;align-items:center;overflow:hidden;}
.screen.active{display:flex;}

/* ════════════════════════════
   SETUP SCREEN
════════════════════════════ */
#setupScreen{
  background:#07020f;
  justify-content:flex-start;
  overflow-y:auto;
  padding:12px 10px 16px;
}
/* Scrollbar hidden but functional */
#setupScreen::-webkit-scrollbar{display:none;}

.ipl-header{
  background:linear-gradient(135deg,#001a40,#003B73,#001a40);
  border:2px solid #FFD700;
  border-radius:14px;
  padding:6px 20px;
  margin-bottom:10px;
  text-align:center;
  box-shadow:0 0 30px rgba(255,215,0,0.35);
  flex-shrink:0;
  width:100%;
}
.ipl-word{
  font-family:'Black Ops One',sans-serif;
  font-size:clamp(36px,10vw,52px);
  background:linear-gradient(135deg,#FFD700,#FF6B00,#FFD700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:8px;line-height:1.1;
}
.ipl-sub{color:#888;font-size:9px;letter-spacing:3px;}

.setup-card{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,215,0,0.2);
  border-radius:16px;
  padding:12px;
  width:100%;
}
.sec-lbl{font-size:9px;color:#FF6B00;letter-spacing:2px;font-weight:900;margin:8px 0 5px;}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:4px;}
.t-btn{
  background:rgba(255,255,255,0.04);
  border:2px solid rgba(255,255,255,0.08);
  border-radius:10px;
  padding:5px 6px;
  cursor:pointer;
  display:flex;align-items:center;gap:5px;
  transition:all 0.15s;width:100%;
}
.t-btn img{width:24px;height:24px;object-fit:contain;flex-shrink:0;}
.t-btn span{font-weight:900;font-size:11px;color:#ccc;}
.vs-div{
  font-family:'Black Ops One',sans-serif;
  text-align:center;font-size:14px;
  background:linear-gradient(135deg,#FF6B00,#FFD700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin:3px 0;
}
.score-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.score-row img{width:22px;height:22px;object-fit:contain;flex-shrink:0;}
.score-row label{color:#777;font-size:10px;font-weight:900;width:36px;flex-shrink:0;}
.score-row input{
  width:60px;background:rgba(255,255,255,0.07);border:2px solid;
  border-radius:8px;font-family:'Black Ops One',sans-serif;
  font-size:22px;text-align:center;padding:1px 0;outline:none;flex-shrink:0;
}
.score-row span{color:#444;font-size:10px;}
.win-row{display:flex;gap:6px;margin-bottom:10px;}
.win-btn{
  flex:1;padding:8px 4px;
  background:rgba(255,255,255,0.04);
  border:2px solid rgba(255,255,255,0.1);
  border-radius:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:all 0.15s;
}
.win-btn img{width:22px;height:22px;object-fit:contain;}
.win-btn span{font-weight:900;font-size:12px;color:#aaa;}
.start-btn{
  width:100%;padding:11px;
  background:linear-gradient(135deg,#FF6B00,#FF0055,#FF6B00);
  background-size:200%;border:none;border-radius:12px;
  color:white;font-family:'Black Ops One',sans-serif;
  font-size:18px;letter-spacing:3px;cursor:pointer;
  box-shadow:0 4px 20px rgba(255,0,85,0.55);
  animation:pulsebg 2s infinite;
}
@keyframes pulsebg{0%,100%{background-position:0%}50%{background-position:100%}}

/* ════════════════════════════
   GAME SCREEN — strict 9:16
════════════════════════════ */
#gameScreen{
  background:#060010;
  justify-content:flex-start;
  position:relative;
}

/* Scanlines */
.scanlines{
  position:absolute;inset:0;
  background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  z-index:1;pointer-events:none;
}

/* Flash */
.flash-overlay{
  position:absolute;inset:0;opacity:0;z-index:999;pointer-events:none;transition:opacity 0.05s;
}

/* — SCOREBOARD — */
.scoreboard{width:100%;padding:6px 10px;z-index:100;flex-shrink:0;}
.score-bar{
  background:linear-gradient(90deg,#001a40,#0d002a,#001a40);
  border:2px solid #FFD700;border-radius:12px;
  padding:6px 10px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 0 20px rgba(255,215,0,0.2);
}
.sb-team{display:flex;align-items:center;gap:6px;flex:1;}
.sb-team.right{flex-direction:row-reverse;}
.sb-team img{width:32px;height:32px;object-fit:contain;transition:all 0.3s;flex-shrink:0;}
.sb-team img.active{filter:drop-shadow(0 0 6px var(--tc));}
.sb-team img.inactive{opacity:0.35;}
.sb-name{font-size:8px;color:#777;letter-spacing:1px;}
.sb-runs{font-family:'Black Ops One',sans-serif;font-size:26px;line-height:1;}
.sb-runs .wkts{font-size:11px;color:#555;margin-left:2px;}
.sb-center{text-align:center;padding:0 6px;flex-shrink:0;}
.sb-ipl{font-family:'Black Ops One',sans-serif;font-size:11px;background:linear-gradient(135deg,#FFD700,#FF6B00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;}
.sb-inn{font-size:8px;color:#FFD700;letter-spacing:1px;}

/* Ball dots */
.ball-dots{display:flex;justify-content:center;gap:6px;margin-top:5px;}
.bdot{
  width:26px;height:26px;border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:2px solid rgba(255,255,255,0.1);
  display:flex;align-items:center;justify-content:center;
  font-family:'Black Ops One',sans-serif;font-size:11px;color:#000;
  transition:all 0.3s;
}

/* — FIELD — takes remaining vertical space */
.field-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;min-height:0;
}
.field{
  /* Size = min of available width or ~55% of frame height */
  width:min(72vw, calc(min(100vw, calc(100vh * 9/16)) * 0.72));
  height:min(72vw, calc(min(100vw, calc(100vh * 9/16)) * 0.72));
  aspect-ratio:1;
  border-radius:50%;
  background:radial-gradient(ellipse at 35% 30%,#1e5c1e,#0d330d 55%,#061806);
  border:3px solid rgba(255,215,0,0.65);
  box-shadow:0 0 50px rgba(0,180,0,0.3),0 0 15px rgba(255,215,0,0.15),inset 0 0 30px rgba(0,0,0,0.5);
  position:relative;
  flex-shrink:0;
}
.field.shake{animation:shk 0.4s;}
@keyframes shk{0%,100%{transform:rotate(0)}20%{transform:rotate(-3deg)}40%{transform:rotate(3deg)}60%{transform:rotate(-2deg)}80%{transform:rotate(2deg)}}
.inner-ring{position:absolute;inset:14%;border-radius:50%;border:1px solid rgba(255,255,255,0.06);}
.pitch{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:26%;height:50%;border:1px solid rgba(255,255,255,0.1);border-radius:3px;}
.stumps{position:absolute;left:50%;transform:translateX(-50%);display:flex;gap:4px;}
.stumps.top{top:5%;}
.stumps.bot{bottom:5%;}
.stump{width:3px;height:16px;background:rgba(255,255,255,0.7);border-radius:2px;transition:all 0.2s;}
.stump.lit{background:#FF4444;box-shadow:0 0 6px #FF3333;}
.logo-circle{position:absolute;left:50%;transform:translateX(-50%);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.logo-bat{bottom:18%;width:58px;height:58px;border-width:3px;border-style:solid;}
.logo-bat img{width:40px;height:40px;object-fit:contain;}
.logo-bowl{top:8%;width:44px;height:44px;border-width:2px;border-style:solid;}
.logo-bowl img{width:30px;height:30px;object-fit:contain;}
.ball{
  position:absolute;width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#ff7755,#8b0000);
  border:1.5px solid rgba(255,200,200,0.5);
  box-shadow:0 0 12px rgba(255,50,0,0.8);
  transform:translate(-50%,-50%);display:none;z-index:25;
  transition:left 0.48s cubic-bezier(0.25,0.46,0.45,0.94),top 0.48s cubic-bezier(0.25,0.46,0.45,0.94);
}

/* — EVENT STRIP — fixed height below field */
.event-strip{
  width:100%;
  flex-shrink:0;
  height:72px;
  display:flex;align-items:center;justify-content:center;
  z-index:200;pointer-events:none;
}
.ev-box{text-align:center;animation:pop 0.38s forwards;}
.ev-icon{font-size:26px;line-height:1;}
.ev-label{font-family:'Black Ops One',sans-serif;font-size:32px;letter-spacing:3px;line-height:1.1;}
.ev-runs{font-family:'Black Ops One',sans-serif;font-size:16px;color:white;opacity:0.7;}
@keyframes pop{0%{transform:scale(0) rotate(-12deg);opacity:0}55%{transform:scale(1.18) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}

/* — SKULLS — bottom of game frame */
.skulls{
  flex-shrink:0;height:32px;
  display:flex;align-items:center;justify-content:center;gap:12px;
  z-index:100;
}
.skull{font-size:20px;filter:grayscale(1);opacity:0.22;transition:all 0.4s;}
.skull.fallen{filter:none;opacity:1;transform:scale(1.2);}

/* ════════════════════════════
   RESULT SCREEN — strict 9:16
════════════════════════════ */
#resultScreen{
  background:#060010;
  justify-content:center;
  padding:12px 10px;
  position:relative;
  overflow:hidden;
}

.confetti-piece{position:absolute;top:-20px;animation:fall linear forwards;z-index:50;pointer-events:none;}
@keyframes fall{from{transform:translateY(0) rotate(0);opacity:1}to{transform:translateY(110%,) rotate(720deg);opacity:0}}

.res-wrap{
  animation:upfade 0.6s forwards;
  text-align:center;width:100%;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
@keyframes upfade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.res-ipl{
  font-family:'Black Ops One',sans-serif;
  font-size:clamp(32px,10vw,44px);
  background:linear-gradient(135deg,#FFD700,#FF6B00,#FFD700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:6px;
}
.res-sub{color:#555;font-size:9px;letter-spacing:3px;}

.winner-card{
  border-radius:22px;padding:16px 14px;
  width:100%;
  animation:glow2 2s infinite;
}
@keyframes glow2{0%,100%{opacity:1}50%{opacity:0.82}}
.winner-lbl{font-size:9px;color:#888;letter-spacing:3px;margin-bottom:6px;}
.winner-logo{width:70px;height:70px;object-fit:contain;animation:bob 1.8s infinite;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-10px) rotate(4deg)}}
.winner-name{font-family:'Black Ops One',sans-serif;font-size:clamp(28px,9vw,38px);letter-spacing:3px;margin-top:4px;line-height:1.1;}
.winner-full{font-size:9px;letter-spacing:1px;color:#666;margin-top:2px;}

.scores-row{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  gap:8px;width:100%;
}
.res-team{text-align:center;flex:1;}
.res-team img{width:36px;height:36px;object-fit:contain;}
.res-team-name{font-size:8px;color:#666;letter-spacing:1px;margin:3px 0;}
.res-team-runs{font-family:'Black Ops One',sans-serif;font-size:24px;}
.res-team-lbl{font-size:8px;color:#444;}
.res-vs{font-family:'Black Ops One',sans-serif;font-size:12px;color:#333;flex-shrink:0;}

.new-match-btn{
  padding:10px 32px;
  background:linear-gradient(135deg,#FF6B00,#FF0055);
  border:none;border-radius:12px;color:white;
  font-family:'Black Ops One',sans-serif;font-size:16px;letter-spacing:2px;
  cursor:pointer;box-shadow:0 4px 24px rgba(255,0,85,0.5);
}
</style>
</head>
<body>
<div id="frame">

<!-- ══ SETUP ══ -->
<div class="screen active" id="setupScreen">
  <div class="ipl-header">
    <div class="ipl-word">IPL</div>
    <div class="ipl-sub">INDIAN PREMIER LEAGUE • 2026</div>
  </div>
  <div class="setup-card">
    <div class="sec-lbl">🏠 HOME TEAM</div>
    <div class="team-grid" id="grid1"></div>
    <div class="vs-div">VS</div>
    <div class="sec-lbl">✈️ AWAY TEAM</div>
    <div class="team-grid" id="grid2"></div>
    <div class="sec-lbl">📊 FINAL SCORE</div>
    <div class="score-row">
      <img id="s1img" src="" alt=""/>
      <label id="s1lbl"></label>
      <input id="inp1" type="number" value="45" min="1" max="120"/>
      <span>runs</span>
    </div>
    <div class="score-row">
      <img id="s2img" src="" alt=""/>
      <label id="s2lbl"></label>
      <input id="inp2" type="number" value="38" min="1" max="120"/>
      <span>runs</span>
    </div>
    <div class="sec-lbl">🏆 WINNER</div>
    <div class="win-row">
      <button class="win-btn" id="wbtn0" onclick="selectWinner(0)">
        <img id="wimg0" src="" alt=""/><span id="wname0"></span>
      </button>
      <button class="win-btn" id="wbtn1" onclick="selectWinner(1)">
        <img id="wimg1" src="" alt=""/><span id="wname1"></span>
      </button>
    </div>
    <button class="start-btn bo" onclick="startMatch()">🏏 START MATCH</button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div class="screen" id="gameScreen">
  <div class="scanlines"></div>
  <div class="flash-overlay" id="flashOverlay"></div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-bar">
      <div class="sb-team" id="sbTeam1">
        <img id="sbLogo1" src="" alt="" style="--tc:#fff"/>
        <div>
          <div class="sb-name" id="sbName1">—</div>
          <div class="sb-runs" id="sbRuns1">0</div>
        </div>
      </div>
      <div class="sb-center">
        <div class="sb-ipl">IPL</div>
        <div class="sb-inn" id="sbInn">INN 1</div>
      </div>
      <div class="sb-team right" id="sbTeam2">
        <img id="sbLogo2" src="" alt="" style="--tc:#fff"/>
        <div style="text-align:right">
          <div class="sb-name" id="sbName2">—</div>
          <div class="sb-runs" id="sbRuns2">—</div>
        </div>
      </div>
    </div>
    <div class="ball-dots">
      <div class="bdot" id="bd0"></div>
      <div class="bdot" id="bd1"></div>
      <div class="bdot" id="bd2"></div>
      <div class="bdot" id="bd3"></div>
      <div class="bdot" id="bd4"></div>
      <div class="bdot" id="bd5"></div>
    </div>
  </div>

  <!-- Field -->
  <div class="field-wrap">
    <div class="field" id="field">
      <div class="inner-ring"></div>
      <div class="pitch"></div>
      <div class="stumps top" id="stumpsTop">
        <div class="stump"></div><div class="stump"></div><div class="stump"></div>
      </div>
      <div class="stumps bot">
        <div class="stump"></div><div class="stump"></div><div class="stump"></div>
      </div>
      <div class="logo-circle logo-bat" id="logoBat">
        <img id="logoBatImg" src="" alt=""/>
      </div>
      <div class="logo-circle logo-bowl" id="logoBowl">
        <img id="logoBowlImg" src="" alt=""/>
      </div>
      <div class="ball" id="ball"></div>
    </div>
  </div>

  <!-- Event text strip -->
  <div class="event-strip" id="eventStrip"></div>

  <!-- Wicket skulls -->
  <div class="skulls">
    <div class="skull" id="skull0">👤</div>
    <div class="skull" id="skull1">👤</div>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div class="screen" id="resultScreen">
  <div id="confettiWrap" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:50;"></div>
  <div class="res-wrap">
    <div class="res-ipl">IPL</div>
    <div class="res-sub">2026 MATCH RESULT</div>
    <div class="winner-card" id="winnerCard">
      <div class="winner-lbl">🏆 WINNER</div>
      <img class="winner-logo" id="winnerLogo" src="" alt=""/>
      <div class="winner-name bo" id="winnerName"></div>
      <div class="winner-full" id="winnerFull"></div>
    </div>
    <div class="scores-row">
      <div class="res-team">
        <img id="res1Logo" src="" alt=""/>
        <div class="res-team-name" id="res1Name"></div>
        <div class="res-team-runs" id="res1Runs"></div>
        <div class="res-team-lbl">runs</div>
      </div>
      <div class="res-vs">VS</div>
      <div class="res-team">
        <img id="res2Logo" src="" alt=""/>
        <div class="res-team-name" id="res2Name"></div>
        <div class="res-team-runs" id="res2Runs"></div>
        <div class="res-team-lbl">runs</div>
      </div>
    </div>
    <button class="new-match-btn" onclick="resetGame()">🔄 NEW MATCH</button>
  </div>
</div>

</div><!-- end #frame -->

<script>
const TEAMS=[
  {id:0,name:"RCB", full:"Royal Challengers Bengaluru",color:"#CC0000",accent:"#FFD700",logo:"img/rcb.png"},
  {id:1,name:"MI",  full:"Mumbai Indians",             color:"#004BA0",accent:"#00CFFF",logo:"img/mi.png"},
  {id:2,name:"CSK", full:"Chennai Super Kings",        color:"#FDB913",accent:"#00AEEF",logo:"img/csk.png"},
  {id:3,name:"KKR", full:"Kolkata Knight Riders",      color:"#8B008B",accent:"#FFD700",logo:"img/kkr.png"},
  {id:4,name:"DC",  full:"Delhi Capitals",             color:"#0078BC",accent:"#EF1C25",logo:"img/dc.png"},
  {id:5,name:"PBKS",full:"Punjab Kings",               color:"#ED1B24",accent:"#FFCD00",logo:"img/pbks.png"},
  {id:6,name:"RR",  full:"Rajasthan Royals",           color:"#E91E8C",accent:"#00D4FF",logo:"img/rr.png"},
  {id:7,name:"SRH", full:"Sunrisers Hyderabad",        color:"#FF6B00",accent:"#FFD700",logo:"img/srh.png"},
  {id:8,name:"LSG", full:"Lucknow Super Giants",       color:"#00B4D8",accent:"#A8DADC",logo:"img/lsg.png"},
  {id:9,name:"GT",  full:"Gujarat Titans",             color:"#1C4E8A",accent:"#00D2FF",logo:"img/gt.png"},
];

const TYPES=[
  {type:"six",   label:"SIX!",  icon:"🚀",color:"#FFD700",runs:6,w:14},
  {type:"four",  label:"FOUR!", icon:"⚡",color:"#00FF88",runs:4,w:18},
  {type:"three", label:"THREE", icon:"🏃",color:"#00CFFF",runs:3,w:10},
  {type:"two",   label:"TWO",   icon:"✌️",color:"#A78BFA",runs:2,w:14},
  {type:"one",   label:"ONE",   icon:"↗", color:"#94A3B8",runs:1,w:20},
  {type:"dot",   label:"DOT",   icon:"⬛",color:"#475569",runs:0,w:12},
  {type:"wicket",label:"OUT!",  icon:"💀",color:"#FF3333",runs:0,w:12},
];

let sel1=0,sel2=1,winnerSel=-1,actx=null,snd=null;
const $=id=>document.getElementById(id);
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

/* ── BUILD TEAM GRIDS ── */
function buildGrids(){
  [0,1].forEach(gi=>{
    const sel=gi===0?sel1:sel2;
    const grid=$('grid'+(gi+1));
    grid.innerHTML='';
    TEAMS.forEach(t=>{
      const btn=document.createElement('button');
      btn.className='t-btn';
      btn.style.borderColor=sel===t.id?t.color:'rgba(255,255,255,0.08)';
      btn.style.background=sel===t.id?t.color+'22':'rgba(255,255,255,0.04)';
      if(sel===t.id) btn.style.boxShadow=`0 0 12px ${t.color}88`;
      btn.innerHTML=`<img src="${t.logo}" onerror="this.style.display='none'"/><span style="color:${sel===t.id?t.accent:'#ccc'}">${t.name}</span>`;
      btn.onclick=()=>{
        if(gi===0) sel1=t.id; else sel2=t.id;
        buildGrids(); updateUI();
      };
      grid.appendChild(btn);
    });
  });
}

function updateUI(){
  const t1=TEAMS[sel1],t2=TEAMS[sel2];
  // Score inputs
  $('s1img').src=t1.logo; $('s1lbl').textContent=t1.name;
  $('inp1').style.borderColor=t1.color; $('inp1').style.color=t1.accent;
  $('s2img').src=t2.logo; $('s2lbl').textContent=t2.name;
  $('inp2').style.borderColor=t2.color; $('inp2').style.color=t2.accent;
  // Winner buttons
  [t1,t2].forEach((t,i)=>{
    $('wimg'+i).src=t.logo;
    $('wname'+i).textContent=t.name;
    $('wname'+i).style.color=winnerSel===i?t.accent:'#aaa';
    const wb=$('wbtn'+i);
    wb.style.borderColor=winnerSel===i?t.color:'rgba(255,255,255,0.1)';
    wb.style.borderWidth=winnerSel===i?'3px':'2px';
    wb.style.background=winnerSel===i?t.color+'22':'rgba(255,255,255,0.04)';
    wb.style.boxShadow=winnerSel===i?`0 0 18px ${t.color}88`:'none';
  });
}
function selectWinner(i){winnerSel=i;updateUI();}

/* ── AUDIO ── */
function initAudio(){
  if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();snd=makeSnd(actx);}
  if(actx.state==='suspended') actx.resume();
}
function makeSnd(ctx){
  const dst=ctx.destination;
  function osc(type,f1,f2,vol,dur,delay=0){
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(dst);o.type=type;
    o.frequency.setValueAtTime(f1,ctx.currentTime+delay);
    if(f2) o.frequency.exponentialRampToValueAtTime(f2,ctx.currentTime+delay+dur);
    g.gain.setValueAtTime(vol,ctx.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+dur);
    o.start(ctx.currentTime+delay);
    o.stop(ctx.currentTime+delay+dur+0.01);
  }
  function noise(vol,dur,lp){
    try{
      const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*dur),ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
      const s=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter();
      f.type=lp?'lowpass':'bandpass';f.frequency.value=lp||900;f.Q.value=0.6;
      s.buffer=buf;s.connect(f);f.connect(g);g.connect(dst);
      g.gain.setValueAtTime(vol,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
      s.start();
    }catch(e){}
  }
  return{
    bat(){noise(0.5,0.07,null);},
    six(){osc('sawtooth',220,880,0.25,0.55);osc('sine',1200,2400,0.12,0.5,0.05);},
    four(){osc('square',440,660,0.18,0.35);},
    wicket(){[0,0.07,0.14].forEach(d=>osc('triangle',200,55,0.28,0.25,d));},
    dot(){osc('sine',220,null,0.07,0.12);},
    crowd(){noise(0.18,0.9,700);}
  };
}
function playSound(type){
  try{
    initAudio();snd.bat();
    if(type==='six') setTimeout(()=>{snd.six();snd.crowd();},80);
    else if(type==='four')   setTimeout(()=>snd.four(),60);
    else if(type==='wicket') setTimeout(()=>snd.wicket(),60);
    else if(type==='dot')    setTimeout(()=>snd.dot(),40);
  }catch(e){}
}

/* ── INNINGS GENERATOR ── */
function genInnings(target){
  function pick(noW){
    const pool=noW?TYPES.filter(e=>e.type!=='wicket'):TYPES;
    const tw=pool.reduce((a,b)=>a+b.w,0);
    let r=Math.random()*tw;
    for(const e of pool){r-=e.w;if(r<=0)return{...e};}
    return{...pool[pool.length-1]};
  }
  const balls=[];let runs=0,wickets=0;
  for(let i=0;i<6;i++){
    let ev;
    if(i===5){
      const need=target-runs;
      if(need>=6)       ev={...TYPES[0]};
      else if(need>=4)  ev={...TYPES[1]};
      else if(need===3) ev={...TYPES[2]};
      else if(need===2) ev={...TYPES[3]};
      else if(need===1) ev={...TYPES[4]};
      else              ev={...TYPES[5]};
    } else {
      ev=pick(wickets>=1);
      let s=0;
      while(runs+ev.runs>target+3&&s++<5) ev=pick(wickets>=1);
    }
    if(ev.type==='wicket') wickets++;
    runs+=ev.runs;
    balls.push({...ev,cumRuns:runs,cumWkts:wickets});
    if(wickets>=2) break;
  }
  return balls;
}

/* ── DOM HELPERS ── */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}
function flashScreen(color){
  const el=$('flashOverlay');
  el.style.background=color;el.style.opacity='0.16';
  setTimeout(()=>el.style.opacity='0',100);
}
function resetDots(){
  for(let i=0;i<6;i++){
    const d=$('bd'+i);
    d.style.background='rgba(255,255,255,0.06)';
    d.style.borderColor='rgba(255,255,255,0.1)';
    d.style.boxShadow='none';d.textContent='';
  }
}
function setDot(i,ev){
  const d=$('bd'+i);
  d.style.background=ev.color;d.style.borderColor=ev.color;
  d.style.boxShadow=`0 0 10px ${ev.color}99`;
  d.textContent=ev.type==='wicket'?'W':ev.runs===0?'·':ev.runs;
}
function setSkull(i,on){
  const el=$('skull'+i);
  el.textContent=on?'💀':'👤';
  el.classList.toggle('fallen',on);
}

/* ── BALL ANIMATION ── */
async function animBall(ev){
  const ball=$('ball');
  let tx=50,ty=15;
  if(ev.type==='six')    {tx=10+Math.random()*80;ty=4;}
  else if(ev.type==='four')   {tx=Math.random()<0.5?4:90;ty=30+Math.random()*30;}
  else if(ev.type==='wicket') {tx=50;ty=12;}
  else                        {tx=38+Math.random()*24;ty=28+Math.random()*22;}
  ball.style.display='block';
  ball.style.left='50%';ball.style.top='62%';
  await sleep(40);
  ball.style.left=tx+'%';ball.style.top=ty+'%';
  await sleep(520);
  ball.style.display='none';
}

/* ── EVENT TEXT ── */
function showEventText(ev){
  const strip=$('eventStrip');
  strip.innerHTML=`<div class="ev-box">
    <div class="ev-icon">${ev.icon}</div>
    <div class="ev-label" style="color:${ev.color};text-shadow:0 0 20px ${ev.color},0 0 40px ${ev.color}88">${ev.label}</div>
    ${ev.runs>0?`<div class="ev-runs">+${ev.runs}</div>`:''}
  </div>`;
  return sleep(900).then(()=>strip.innerHTML='');
}

/* ── PLAY ONE INNINGS ── */
async function playInnings(balls,innNum,batting,bowling){
  // Setup field logos
  const bc=$('logoBat');
  bc.style.borderColor=batting.color;
  bc.style.background=`radial-gradient(circle,${batting.color}55,#000)`;
  bc.style.boxShadow=`0 0 24px ${batting.color}cc`;
  $('logoBatImg').src=batting.logo;

  const bwc=$('logoBowl');
  bwc.style.borderColor=bowling.color+'55';
  bwc.style.background=`radial-gradient(circle,${bowling.color}33,#000)`;
  bwc.style.boxShadow=`0 0 12px ${bowling.color}66`;
  $('logoBowlImg').src=bowling.logo;

  // Scoreboard
  if(innNum===1){
    $('sbLogo1').classList.replace('inactive','active')||$('sbLogo1').classList.add('active');
    $('sbLogo2').classList.replace('active','inactive')||$('sbLogo2').classList.add('inactive');
    $('sbRuns1').textContent='0';
    $('sbRuns2').textContent='—';
  } else {
    $('sbLogo2').classList.replace('inactive','active')||$('sbLogo2').classList.add('active');
    $('sbLogo1').classList.replace('active','inactive')||$('sbLogo1').classList.add('inactive');
    $('sbRuns2').textContent='0';
  }
  $('sbInn').textContent='INN '+innNum;

  resetDots();
  document.querySelectorAll('.stump').forEach(s=>s.classList.remove('lit'));
  setSkull(0,false);setSkull(1,false);

  for(let i=0;i<balls.length;i++){
    const ev=balls[i];
    playSound(ev.type);
    flashScreen(ev.color);

    if(ev.type==='wicket'){
      $('stumpsTop').querySelectorAll('.stump').forEach(s=>s.classList.add('lit'));
      $('field').classList.add('shake');
      await sleep(380);
      $('field').classList.remove('shake');
      $('stumpsTop').querySelectorAll('.stump').forEach(s=>s.classList.remove('lit'));
    }

    await Promise.all([animBall(ev), showEventText(ev)]);

    // Update scoreboard with exact innings value
    if(innNum===1){
      $('sbRuns1').innerHTML=ev.cumRuns+(ev.cumWkts>0?`<span class="wkts">/${ev.cumWkts}w</span>`:'');
      $('sbRuns1').style.color=TEAMS[sel1].accent;
    } else {
      $('sbRuns2').innerHTML=ev.cumRuns+(ev.cumWkts>0?`<span class="wkts">/${ev.cumWkts}w</span>`:'');
      $('sbRuns2').style.color=TEAMS[sel2].accent;
    }

    setDot(i,ev);
    setSkull(0,ev.cumWkts>=1);
    setSkull(1,ev.cumWkts>=2);

    await sleep(180);
  }
}

/* ── START MATCH ── */
async function startMatch(){
  if(winnerSel===-1){alert('Winner select karo!');return;}
  initAudio();
  const t1=TEAMS[sel1],t2=TEAMS[sel2];
  const tgt1=Math.max(1,parseInt($('inp1').value)||40);
  const tgt2=Math.max(1,parseInt($('inp2').value)||30);
  const inn1=genInnings(tgt1);
  const inn2=genInnings(tgt2);

  $('sbLogo1').src=t1.logo;$('sbLogo1').style.setProperty('--tc',t1.color);
  $('sbLogo2').src=t2.logo;$('sbLogo2').style.setProperty('--tc',t2.color);
  $('sbName1').textContent=t1.name;
  $('sbName2').textContent=t2.name;

  showScreen('gameScreen');
  await sleep(300);

  await playInnings(inn1,1,t1,t2);
  await sleep(700);
  await playInnings(inn2,2,t2,t1);
  await sleep(500);

  const winner=winnerSel===0?t1:t2;
  showResult(winner,t1,t2,inn1[inn1.length-1].cumRuns,inn2[inn2.length-1].cumRuns);
}

/* ── RESULT ── */
function showResult(winner,t1,t2,final1,final2){
  const card=$('winnerCard');
  card.style.background=`linear-gradient(135deg,${winner.color}22,${winner.accent}11,${winner.color}22)`;
  card.style.border=`3px solid ${winner.color}`;
  card.style.boxShadow=`0 0 60px ${winner.color}55`;
  $('winnerLogo').src=winner.logo;
  $('winnerLogo').style.filter=`drop-shadow(0 0 20px ${winner.color})`;
  $('winnerName').textContent=winner.name;
  $('winnerName').style.color=winner.accent;
  $('winnerName').style.textShadow=`0 0 30px ${winner.accent}`;
  $('winnerFull').textContent=winner.full;

  [[t1,final1,'1'],[t2,final2,'2']].forEach(([t,r,n])=>{
    $('res'+n+'Logo').src=t.logo;
    $('res'+n+'Logo').style.filter=t.id===winner.id?`drop-shadow(0 0 8px ${t.color})`:'grayscale(0.6)';
    $('res'+n+'Logo').style.opacity=t.id===winner.id?'1':'0.45';
    $('res'+n+'Name').textContent=t.name;
    $('res'+n+'Runs').textContent=r;
    $('res'+n+'Runs').style.color=t.id===winner.id?t.accent:'#555';
  });

  // Confetti inside frame
  const wrap=$('confettiWrap');wrap.innerHTML='';
  const cols=[winner.color,'#FFD700','#FF6B00','#fff','#00FF88','#FF69B4'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    const sz=6+Math.random()*8;
    el.style.cssText=`left:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${cols[i%cols.length]};border-radius:${Math.random()>0.5?'50%':'3px'};animation-duration:${1.4+Math.random()*1.4}s;animation-delay:${Math.random()*1.1}s;`;
    wrap.appendChild(el);
  }
  try{initAudio();snd.crowd();}catch(e){}
  showScreen('resultScreen');
}

function resetGame(){winnerSel=-1;updateUI();showScreen('setupScreen');}

/* ── INIT ── */
buildGrids();
updateUI();
</script>
